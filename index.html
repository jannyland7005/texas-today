<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텍사스, 오늘</title>
  <meta name="theme-color" content="#8d6748" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    :root {
      --bg: #f4f1ec;
      --paper: #fffdf8;
      --ink: #2c2925;
      --muted: #6b6258;
      --line: #e9dccb;
      --accent: #8d6748;
      --accent-soft: #f1dfc9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: white;
      border: 1px solid #e5dfd7;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
      position: sticky;
      top: 14px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 6px;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 800;
      font-size: 14px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid #d9d1c7;
      border-radius: 12px;
      padding: 12px;
      font-family: inherit;
      font-size: 16px;
      background: #fffdfb;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      margin-top: 12px;
      font-size: 16px;
    }
    .primary { background: var(--accent); color: white; }
    .secondary { background: #eee5da; color: #3f352d; }
    .hint {
      font-size: 12px;
      color: #85776b;
      margin-top: 10px;
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fff7ec;
      border: 1px solid #eadcc9;
      border-radius: 12px;
      color: #6b6258;
      font-size: 13px;
      line-height: 1.45;
      min-height: 40px;
    }
    .preview {
      overflow: auto;
      display: flex;
      justify-content: center;
      padding-bottom: 20px;
    }
    canvas {
      width: min(100%, 620px);
      height: auto;
      background: #f8eedf;
      border-radius: 8px;
      box-shadow: 0 16px 46px rgba(0,0,0,.16);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 900px) {
      .app {
        display: block;
        padding: 10px;
      }
      .panel {
        position: static;
        margin-bottom: 14px;
      }
      .preview {
        display: block;
      }
      canvas {
        width: 100%;
      }
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>텍사스, 오늘</h1>
      <p>가족 뉴스레터 이미지를 만들고 공유합니다.</p>

      <label>날짜</label>
      <input id="dateInput" type="date" />

      <label>부제 문구</label>
      <input id="subtitleInput" type="text" placeholder="부제 문구를 입력하세요." />

      <label>오늘의 가족 소식</label>
      <textarea id="familyText" placeholder="오늘의 가족 소식을 입력하세요."></textarea>

      <label>사진 업로드</label>
      <input id="photoInput" type="file" accept="image/*" multiple />
      <p class="hint">최대 4장까지 표시됩니다. 휴대폰에서는 사진 앨범에서 선택하거나 바로 촬영할 수 있습니다.</p>

      <button class="secondary" id="rerollBtn">오늘의 건강/생활 팁 다시 조합</button>
      <button class="primary" id="shareBtn">카카오톡/문자/이메일로 공유</button>

      <div id="status" class="status">내용을 입력하거나 사진을 올리면 자동으로 미리보기가 갱신됩니다.</div>
      <p class="hint">공유 버튼을 누르면 카카오톡, 문자, 이메일 등으로 뉴스레터 이미지를 보낼 수 있습니다.</p>
    </aside>

    <main class="preview">
      <canvas id="newsletterCanvas" width="1080" height="1920"></canvas>
    </main>
  </div>

function seedFromDate(dateStr) {
  let n = 0;
  for (const ch of dateStr || "") n = (n * 31 + ch.charCodeAt(0)) >>> 0;
  return n + rerollOffset;
}
function pick(arr, seed, offset=0) {
  return arr[(seed + offset) % arr.length];
}
function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}
function canvasFont(weight, size) {
  return `${weight} ${size}px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif`;
}
function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function fillRounded(ctx, x, y, w, h, r, fill, stroke=null, lw=1) {
  roundedRect(ctx, x, y, w, h, r);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lw;
    ctx.stroke();
  }
}
function wrapText(ctx, text, maxWidth) {
  const source = (text || "").replace(/\n/g, " \n ");
  const tokens = source.split(/\s+/).filter(t => t.length);
  const lines = [];
  let line = "";
  for (const token of tokens) {
    if (token === "\n") {
      if (line) lines.push(line);
      line = "";
      continue;
    }
    const test = line ? line + " " + token : token;
    if (ctx.measureText(test).width <= maxWidth) {
      line = test;
    } else {
      if (line) lines.push(line);
      if (ctx.measureText(token).width > maxWidth) {
        let chunk = "";
        for (const ch of token) {
          const t = chunk + ch;
          if (ctx.measureText(t).width <= maxWidth) chunk = t;
          else {
            if (chunk) lines.push(chunk);
            chunk = ch;
          }
        }
        line = chunk;
      } else {
        line = token;
      }
    }
  }
  if (line) lines.push(line);
  return lines;
}
function drawWrapped(ctx, text, x, y, maxWidth, lineHeight, color="#2c2925") {
  ctx.fillStyle = color;
  const lines = wrapText(ctx, text, maxWidth);
  for (const line of lines) {
    ctx.fillText(line, x, y);
    y += lineHeight;
  }
  return y;
}
function drawIcon(ctx, emoji, x, y) {
  fillRounded(ctx, x, y, 52, 52, 18, "#f1dfc9");
  ctx.font = "30px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(emoji, x+26, y+28);
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
}
function drawSectionHead(ctx, emoji, title, x, y) {
  drawIcon(ctx, emoji, x, y-38);
  ctx.font = canvasFont(800, 39);
  ctx.fillStyle = "#2c2925";
  ctx.fillText(title, x+70, y);
}
function drawImageCover(ctx, img, x, y, w, h, r) {
  ctx.save();
  roundedRect(ctx, x, y, w, h, r);
  ctx.clip();
  const iw = img.naturalWidth || img.width;
  const ih = img.naturalHeight || img.height;
  const scale = Math.max(w/iw, h/ih);
  const sw = w / scale;
  const sh = h / scale;
  const sx = (iw - sw) / 2;
  const sy = (ih - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  ctx.restore();
  roundedRect(ctx, x, y, w, h, r);
  ctx.strokeStyle = "#efe1cf";
  ctx.lineWidth = 2;
  ctx.stroke();
}
function miniBoxHeight(items) {
  return 76 + items.length * 46 + 30;
}
function drawMiniBox(ctx, title, items, x, y, w) {
  const h = miniBoxHeight(items);
  fillRounded(ctx, x, y, w, h, 22, "#fbf5ec", "#eadcc9", 1);
  ctx.font = canvasFont(800, 30);
  ctx.fillStyle = "#2c2925";
  ctx.fillText(title, x+24, y+42);
  ctx.font = canvasFont(500, 29);
  let yy = y+90;
  for (const item of items) {
    ctx.fillText("•", x+28, yy);
    ctx.fillText(item, x+58, yy);
    yy += 46;
  }
  return y + h;
}
function drawMove(ctx, num, title, desc, x, y, w) {
  const h = 138;
  fillRounded(ctx, x, y, w, h, 22, "#f8f2e9", "#e7d8c6", 1);
  fillRounded(ctx, x+18, y+26, 58, 58, 18, "#ffffff", "#e6d5c2", 2);
  ctx.font = canvasFont(800, 31);
  ctx.fillStyle = "#8d6748";
  ctx.textAlign = "center";
  ctx.fillText(String(num), x+47, y+66);
  ctx.textAlign = "left";
  ctx.font = canvasFont(800, 31);
  ctx.fillStyle = "#2c2925";
  ctx.fillText(title, x+100, y+48);
  ctx.font = canvasFont(500, 27);
  drawWrapped(ctx, desc, x+100, y+90, w-124, 38, "#5e554c");
  return y + h;
}
async function loadImageFromFile(file) {
  const dataUrl = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  const img = new Image();
  img.src = dataUrl;
  await img.decode().catch(() => new Promise(res => { img.onload = res; img.onerror = res; }));
  return img;
}
async function handlePhotos(files) {
  setStatus("사진을 불러오는 중입니다.");
  const selected = Array.from(files || []).slice(0, 4);
  uploadedImages = [];
  for (const file of selected) {
    try {
      const img = await loadImageFromFile(file);
      if ((img.naturalWidth || img.width) > 0) uploadedImages.push(img);
    } catch (e) {
      console.error(e);
    }
  }
  renderNewsletter();
  setStatus(uploadedImages.length ? `${uploadedImages.length}장의 사진이 반영되었습니다.` : "사진이 선택되지 않았습니다.");
}
function renderNewsletter() {
  const canvas = document.getElementById("newsletterCanvas");
  const ctx = canvas.getContext("2d");
  const date = document.getElementById("dateInput").value;
  const subtitle = document.getElementById("subtitleInput").value.trim();
  const familyText = document.getElementById("familyText").value.trim();
  const seed = seedFromDate(date);
  const health = pick(healthTips, seed, 0);
  const habit = pick(lifestyleTips, seed, 7);
  const mind = pick(mindTips, seed, 13);
  const ex = pick(exerciseSets, seed, 23);

  let y = 0;
  canvas.width = W;
  canvas.height = 2600;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const grad = ctx.createLinearGradient(0,0,0,2600);
  grad.addColorStop(0, "#f8eedf");
  grad.addColorStop(.45, "#fff9ef");
  grad.addColorStop(1, "#f5eadb");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,2600);

  y = 76;
  ctx.font = canvasFont(900, 64);
  ctx.fillStyle = "#2c2925";
  ctx.fillText("텍사스, 오늘", 58, y);
  ctx.font = canvasFont(500, 31);
  ctx.fillStyle = "#6b6258";
  if (subtitle) ctx.fillText(subtitle, 58, y+46);

  const dateText = formatDate(date);
  ctx.font = canvasFont(800, 28);
  const dw = ctx.measureText(dateText).width + 56;
  fillRounded(ctx, W-58-dw, 36, dw, 68, 34, "#fffdf8", "#e9dccb", 2);
  ctx.fillStyle = "#2c2925";
  ctx.fillText(dateText, W-58-dw+28, 82);

  y = 150;
  // Family card
  const cardX = 58, cardW = W-116;
  let cardY = y;
  let innerY = cardY + 70;
  const photoCount = uploadedImages.length;
  let photoHeight = 0;
  let textStartY;

  if (photoCount === 0) {
    photoHeight = 220;
  } else if (photoCount === 1) {
    photoHeight = 440;
  } else {
    photoHeight = 614;
  }
  ctx.font = canvasFont(500, 32);
  const familyLines = wrapText(ctx, familyText, cardW-60);
  const familyH = familyText ? familyLines.length * 54 + 30 : 20;
  const familyCardH = 86 + photoHeight + familyH + 26;
  fillRounded(ctx, cardX, cardY, cardW, familyCardH, 28, "rgba(255,253,248,.96)", "#e9dccb", 2);
  drawSectionHead(ctx, "🏡", "오늘의 우리 소식", cardX+30, cardY+62);
  const px = cardX+30;
  let py = cardY+100;
  const gap = 14;
  if (photoCount === 0) {
    fillRounded(ctx, px, py, cardW-60, 220, 22, "#f5eadb");
    ctx.font = canvasFont(700, 30);
    ctx.fillStyle = "#8d765f";
    ctx.textAlign = "center";
    ctx.fillText("사진을 올리면 여기에 표시됩니다", px+(cardW-60)/2, py+120);
    ctx.textAlign = "left";
    textStartY = py + 260;
  } else if (photoCount === 1) {
    drawImageCover(ctx, uploadedImages[0], px, py, cardW-60, 440, 22);
    textStartY = py + 480;
  } else {
    const iw = (cardW-60-gap)/2;
    const ih = 300;
    uploadedImages.slice(0,4).forEach((img, i) => {
      const col = i % 2;
      const row = Math.floor(i/2);
      drawImageCover(ctx, img, px + col*(iw+gap), py + row*(ih+gap), iw, ih, 22);
    });
    textStartY = py + 2*ih + gap + 38;
  }
  ctx.font = canvasFont(500, 32);
  drawWrapped(ctx, familyText, px, textStartY, cardW-60, 54);
  y = cardY + familyCardH + 24;

  // Health
  cardY = y;
  ctx.font = canvasFont(500, 32);
  const healthLeadLines = wrapText(ctx, health.lead, cardW-60);
  const goodBoxH = miniBoxHeight(health.good);
  const avoidBoxH = miniBoxHeight(health.avoid);
  const healthCardH = 110 + healthLeadLines.length*54 + 24 + goodBoxH + 18 + avoidBoxH + 42;
  fillRounded(ctx, cardX, cardY, cardW, healthCardH, 28, "rgba(255,253,248,.96)", "#e9dccb", 2);
  drawSectionHead(ctx, "🥣", "오늘의 건강 상식", cardX+30, cardY+62);
  ctx.font = canvasFont(500, 32);
  let hy = drawWrapped(ctx, health.lead, cardX+30, cardY+120, cardW-60, 54);
  hy += 18;
  hy = drawMiniBox(ctx, "오늘 먹으면 좋은 메뉴", health.good, cardX+30, hy, cardW-60) + 18;
  drawMiniBox(ctx, "오늘 조심할 메뉴", health.avoid, cardX+30, hy, cardW-60);
  y = cardY + healthCardH + 24;

  // Habit
  cardY = y;
  ctx.font = canvasFont(500, 32);
  const habitLines = wrapText(ctx, habit, cardW-60);
  const habitCardH = 100 + habitLines.length*54 + 26;
  fillRounded(ctx, cardX, cardY, cardW, habitCardH, 28, "rgba(255,253,248,.96)", "#e9dccb", 2);
  drawSectionHead(ctx, "🌿", "오늘의 생활 습관", cardX+30, cardY+62);
  ctx.font = canvasFont(500, 32);
  drawWrapped(ctx, habit, cardX+30, cardY+124, cardW-60, 54);
  y = cardY + habitCardH + 24;

  // Mind
  cardY = y;
  ctx.font = canvasFont(700, 34);
  const quote = `“${mind.text}”`;
  const quoteLines = wrapText(ctx, quote, cardW-60);
  ctx.font = canvasFont(500, 26);
  const noteLines = wrapText(ctx, mind.note, cardW-60);
  const mindCardH = 100 + quoteLines.length*58 + 42 + noteLines.length*38 + 30;
  fillRounded(ctx, cardX, cardY, cardW, mindCardH, 28, "rgba(255,253,248,.96)", "#e9dccb", 2);
  drawSectionHead(ctx, "🕯️", "마음 습관", cardX+30, cardY+62);
  ctx.font = canvasFont(700, 34);
  let my = drawWrapped(ctx, quote, cardX+30, cardY+130, cardW-60, 58);
  ctx.font = canvasFont(500, 27);
  ctx.fillStyle = "#6b6258";
  ctx.fillText(`— ${mind.by}`, cardX+30, my+8);
  ctx.font = canvasFont(500, 26);
  drawWrapped(ctx, mind.note, cardX+30, my+54, cardW-60, 38, "#6b6258");
  y = cardY + mindCardH + 24;

  // Exercise
  cardY = y;
  const exCardH = 110 + 3*138 + 2*16 + 90;
  fillRounded(ctx, cardX, cardY, cardW, exCardH, 28, "rgba(255,253,248,.96)", "#e9dccb", 2);
  drawSectionHead(ctx, "🪑", "하루 운동", cardX+30, cardY+62);
  let ey = cardY + 100;
  ex.forEach((m, i) => {
    ey = drawMove(ctx, i+1, m[0], m[1], cardX+30, ey, cardW-60) + 16;
  });
  ctx.font = canvasFont(500, 26);
  drawWrapped(ctx, "통증, 어지럼, 숨참이 있으면 즉시 멈추고, 지팡이·의자 등 안전한 지지대를 사용하세요.", cardX+30, ey+24, cardW-60, 38, "#6b6258");
  y = cardY + exCardH + 40;

  // Footer
  ctx.font = canvasFont(500, 22);
  drawWrapped(ctx, `참고: ${health.source}; CDC Older Adult Physical Activity Guidelines. 개인 건강 상태에 따라 의사 상담이 필요할 수 있습니다.`, 66, y, 760, 34, "#75695f");
  ctx.font = canvasFont(900, 22);
  ctx.fillStyle = "#9a816b";
  ctx.fillText("from 미국 가족", 860, y+26);

  const finalH = Math.ceil(y + 150);
  const imgData = ctx.getImageData(0, 0, W, finalH);
  canvas.height = finalH;
  const ctx2 = canvas.getContext("2d");
  ctx2.putImageData(imgData, 0, 0);

  latestBlob = null;
}
function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, "image/png", 0.95));
}
async function getBlob() {
  const canvas = document.getElementById("newsletterCanvas");
  latestBlob = await canvasToBlob(canvas);
  return latestBlob;
}
async function shareNewsletter() {
  try {
    setStatus("공유 이미지를 준비하는 중입니다.");
    renderNewsletter();
    const blob = await getBlob();
    const date = document.getElementById("dateInput").value || "today";
    const file = new File([blob], `텍사스_오늘_${date}.png`, { type: "image/png" });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file] });
      setStatus("공유창을 열었습니다.");
      return;
    }
    if (navigator.share) {
      await navigator.share({ title: "텍사스, 오늘" });
      setStatus("이 기기에서는 이미지 파일 직접 공유가 제한됩니다. 브라우저/카카오톡 공유 제한일 수 있습니다.");
      return;
    }
    setStatus("이 브라우저에서는 직접 공유가 제한됩니다. 다른 브라우저에서 다시 시도해보세요.");
  } catch (err) {
    console.error(err);
    setStatus("공유가 취소되었거나 제한되었습니다. ‘이미지 파일로 열기’를 눌러 이미지를 길게 눌러 공유하세요.");
  }
}

function initDate() {
  const today = new Date();
  const local = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().slice(0,10);
  document.getElementById("dateInput").value = local;
}
document.addEventListener("DOMContentLoaded", () => {
  initDate();
  renderNewsletter();

  document.getElementById("dateInput").addEventListener("change", renderNewsletter);
  document.getElementById("subtitleInput").addEventListener("input", renderNewsletter);
  document.getElementById("familyText").addEventListener("input", renderNewsletter);
  document.getElementById("photoInput").addEventListener("change", e => handlePhotos(e.target.files));
  document.getElementById("rerollBtn").addEventListener("click", () => { rerollOffset += 1; renderNewsletter(); });
  document.getElementById("shareBtn").addEventListener("click", shareNewsletter);
});
</script>
