<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>텍사스, 오늘</title>
  <meta name="theme-color" content="#8d6748" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>텍사스, 오늘</h1>
      <p>가족 뉴스레터 이미지를 만들고 공유합니다.</p>

      <label for="dateInput">날짜</label>
      <input id="dateInput" type="date" />

      <label for="subtitleInput">부제 문구</label>
      <input id="subtitleInput" type="text" placeholder="부제 문구를 입력하세요." />

      <label for="familyText">오늘의 가족 소식</label>
      <textarea id="familyText" placeholder="오늘의 가족 소식을 입력하세요."></textarea>

      <label for="photoInput">사진 업로드</label>
      <input id="photoInput" type="file" accept="image/*" multiple />
      <p class="hint">최대 4장까지 표시됩니다. 사진은 잘리지 않고 전체가 보이도록 배치됩니다.</p>

      <button class="secondary" id="rerollBtn">오늘의 건강/생활 팁 다시 조합</button>
      <button class="primary" id="shareBtn">카카오톡/문자/이메일로 공유</button>

      <div id="status" class="status">내용을 입력하거나 사진을 올리면 자동으로 미리보기가 갱신됩니다.</div>
      <p class="hint">공유가 제한되면 Chrome 또는 Safari에서 다시 시도해보세요.</p>
    </aside>

    <main class="preview">
      <canvas id="newsletterCanvas" width="1080" height="1920"></canvas>
    </main>
  </div>

  <script src="tips.js"></script>
  <script src="renderer.js"></script>
  <script src="share.js"></script>
  <script src="app.js"></script>
</body>
</html>
